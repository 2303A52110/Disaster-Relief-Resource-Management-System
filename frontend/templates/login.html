<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Disaster Relief System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
        }
        .login-header {
            background: #007bff;
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .login-body {
            padding: 2rem;
        }
        .role-card {
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .role-card:hover {
            border-color: #007bff;
            background-color: #f8f9fa;
        }
        .role-card.selected {
            border-color: #007bff;
            background-color: #e7f3ff;
        }
        .role-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-hand-holding-medical fa-3x mb-3"></i>
            <h2>Disaster Relief System</h2>
            <p>Select Your Role</p>
        </div>
        <div class="login-body">
            <form id="loginForm" method="POST" action="/login">
                <div class="role-card" data-role="management">
                    <div class="text-center">
                        <i class="fas fa-user-tie role-icon text-primary"></i>
                        <h5>Management Authority</h5>
                        <p class="text-muted small">View reports, manage resources, oversee operations</p>
                    </div>
                </div>
                <div class="role-card" data-role="staff">
                    <div class="text-center">
                        <i class="fas fa-user-md role-icon text-success"></i>
                        <h5>Staff Member</h5>
                        <p class="text-muted small">Submit reports, manage victims, coordinate relief</p>
                    </div>
                </div>
                <input type="hidden" name="role" id="selectedRole">
                <button type="submit" class="btn btn-primary w-100 mt-3" id="loginBtn" disabled>
                    <i class="fas fa-sign-in-alt"></i> Continue
                </button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const roleCards = document.querySelectorAll('.role-card');
            const selectedRoleInput = document.getElementById('selectedRole');
            const loginBtn = document.getElementById('loginBtn');

            roleCards.forEach(card => {
                card.addEventListener('click', function() {
                    roleCards.forEach(c => c.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedRoleInput.value = this.dataset.role;
                    loginBtn.disabled = false;
                });
            });
        });
    </script>
</body>
</html>
